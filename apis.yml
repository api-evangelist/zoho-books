apis:
  - aid: zoho-books:rest-api-v3
    name: Zoho Books REST API v3
    description: >-
      The Zoho Books REST API v3 provides full programmatic access to the
      Zoho Books accounting data model including contacts, invoices,
      estimates, sales orders, purchase orders, bills, expenses, banking,
      items, taxes, projects, and financial reports. Authentication uses
      OAuth 2.0 with the Zoho-oauthtoken header, and base URLs vary by
      regional data center (.com, .eu, .in, .com.au, .jp, .ca, .com.cn,
      .sa). Standard pagination, filtering, and rate limiting are
      supported with up to 100 requests per minute per organization.
    humanURL: https://www.zoho.com/books/api/v3/introduction/
    baseURL: https://www.zohoapis.com/books/v3
    tags:
      - Accounting
      - Invoicing
      - Expenses
      - Banking
      - OAuth 2.0
      - REST
