aid: zoho-books
name: Zoho Books
description: >-
  Zoho Books is online accounting software for small and growing businesses
  that handles invoicing, expenses, banking, projects, inventory, vendor
  bills, reporting, and end-to-end GST/VAT compliance. It is part of the
  Zoho Finance suite and integrates with the rest of the Zoho One platform
  alongside payment gateways, banks, and tax authorities. The Zoho Books
  REST API exposes the full accounting data model — contacts, invoices,
  estimates, expenses, bills, banking, items, taxes, and reports — using
  OAuth 2.0 (Zoho-oauthtoken) for authentication and per-region data
  center base URLs.
